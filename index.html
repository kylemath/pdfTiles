<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeHaLek</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <!-- CSP: block all outbound JS network calls — no data can leave this page -->
    <meta http-equiv="Content-Security-Policy" content="connect-src http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; object-src 'none'; base-uri 'none';">
    <!-- pdf-lib is bundled locally — zero CDN calls, works fully offline -->
    <script src="pdf-lib.min.js"></script>
    <style>
        /* ── Colour tokens ──────────────────────────────────────── */
        :root {
            --bg:             #f8f9fa;
            --card:           #ffffff;
            --card-border:    #e0e0e0;
            --card-shadow:    rgba(0,0,0,0.05);
            --text:           #333333;
            --text-muted:     #555555;
            --text-light:     #888888;
            --text-xlight:    #aaaaaa;
            --label:          #333333;
            --input-bg:       #ffffff;
            --input-bg-file:  #fafafa;
            --input-border:   #cccccc;
            --range-track:    #dddddd;
            --badge-bg:       #e6f4ea;
            --badge-text:     #137333;
            --canvas-border:  #dddddd;
            --canvas-shadow:  rgba(0,0,0,0.07);
            --btn-dis-bg:     #e0e0e0;
            --btn-dis-text:   #888888;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg:             #111827;
                --card:           #1f2937;
                --card-border:    #374151;
                --card-shadow:    rgba(0,0,0,0.4);
                --text:           #f3f4f6;
                --text-muted:     #d1d5db;
                --text-light:     #9ca3af;
                --text-xlight:    #6b7280;
                --label:          #e5e7eb;
                --input-bg:       #374151;
                --input-bg-file:  #2d3748;
                --input-border:   #4b5563;
                --range-track:    #4b5563;
                --badge-bg:       #064e3b;
                --badge-text:     #6ee7b7;
                --canvas-border:  #4b5563;
                --canvas-shadow:  rgba(0,0,0,0.35);
                --btn-dis-bg:     #374151;
                --btn-dis-text:   #6b7280;
            }
        }

        /* ── Base ───────────────────────────────────────────────── */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--card-shadow);
        }

        /* ── Header / logo ──────────────────────────────────────── */
        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .app-logo {
            width: 110px;
            height: auto;
        }
        .app-tagline {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--text-light);
            font-style: italic;
        }

        /* ── Form elements ──────────────────────────────────────── */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--label); }

        input[type="file"], select, button {
            width: 100%;
            padding: 14px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text);
        }
        input[type="file"] {
            background-color: var(--input-bg-file);
            cursor: pointer;
        }
        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex-grow: 1;
            height: 8px;
            border-radius: 5px;
            background: var(--range-track);
            outline: none;
            accent-color: #007bff;
            border: none;
        }
        .range-value {
            font-weight: bold;
            min-width: 45px;
            text-align: right;
            color: var(--text-muted);
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            color: var(--label);
        }
        .checkbox-container input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #007bff;
        }

        /* ── Button ─────────────────────────────────────────────── */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover  { background-color: #0056b3; }
        button:active { background-color: #004085; }
        button:disabled { background-color: var(--btn-dis-bg); color: var(--btn-dis-text); cursor: not-allowed; }

        /* ── Status / badge ─────────────────────────────────────── */
        .status { margin-top: 20px; font-weight: bold; text-align: center; font-size: 14px; }
        .secure-badge {
            display: block;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        /* ── Grid sliders ───────────────────────────────────────── */
        .grid-slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .grid-axis-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 34px;
        }
        .grid-axis-val {
            font-size: 17px;
            font-weight: bold;
            color: #007bff;
            min-width: 16px;
            text-align: center;
        }
        .grid-summary {
            font-size: 12px;
            color: var(--text-xlight);
            text-align: right;
            margin-top: 4px;
        }

        /* ── Live preview ───────────────────────────────────────── */
        .preview-section {
            display: block;
            margin-bottom: 20px;
            text-align: center;
        }
        .preview-label {
            font-size: 11px;
            color: var(--text-xlight);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
            margin-bottom: 6px;
        }
        #previewCanvas {
            border: 1px solid var(--canvas-border);
            border-radius: 5px;
            box-shadow: 0 2px 8px var(--canvas-shadow);
            background: #fff;
            max-width: 100%;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="app-header">
        <img src="logo.svg" alt="LeHaLek" class="app-logo">
        <p class="app-tagline">Share, divide &amp; distribute</p>
    </div>
    <div class="secure-badge">🔒 100% Local Processing — No Server Uploads</div>
    
    <div class="form-group">
        <label for="fileInput">Select PDF or Image File:</label>
        <input type="file" id="fileInput" accept="application/pdf,image/jpeg,image/png,image/gif,image/webp,image/bmp,image/tiff,image/*">
    </div>

    <div class="form-group">
        <label>Grid Layout:</label>
        <datalist id="gridTicks">
            <option value="1"><option value="2"><option value="3">
            <option value="4"><option value="5"><option value="6">
        </datalist>
        <div class="grid-slider-row">
            <span class="grid-axis-label">Rows</span>
            <span class="grid-axis-val" id="rowsVal">2</span>
            <input type="range" id="gridRows" min="1" max="6" step="1" value="2" list="gridTicks">
        </div>
        <div class="grid-slider-row">
            <span class="grid-axis-label">Cols</span>
            <span class="grid-axis-val" id="colsVal">2</span>
            <input type="range" id="gridCols" min="1" max="6" step="1" value="2" list="gridTicks">
        </div>
        <div class="grid-summary" id="gridSummary">= 4 copies</div>
    </div>

    <div class="form-group">
        <label for="marginSize">Cell Inner Margin:</label>
        <div class="range-container">
            <input type="range" id="marginSize" min="0" max="40" value="10">
            <span id="marginVal" class="range-value">10 px</span>
        </div>
    </div>

    <div class="form-group">
        <label class="checkbox-container">
            <input type="checkbox" id="toggleBorder" checked>
            Draw borders around grid cells
        </label>
    </div>

    <div class="form-group">
        <label class="checkbox-container">
            <input type="checkbox" id="toggleLandscape">
            Landscape output (horizontal page)
        </label>
    </div>

    <div class="preview-section" id="previewSection">
        <div class="preview-label">Live Preview</div>
        <canvas id="previewCanvas" width="180" height="233"></canvas>
    </div>

    <button id="processBtn" disabled>Tile & Download</button>
    <div id="status" class="status"></div>
</div>

<script>
    const fileInput    = document.getElementById('fileInput');
    const rowsInput    = document.getElementById('gridRows');
    const colsInput    = document.getElementById('gridCols');
    const rowsVal      = document.getElementById('rowsVal');
    const colsVal      = document.getElementById('colsVal');
    const gridSummary  = document.getElementById('gridSummary');
    const marginInput  = document.getElementById('marginSize');
    const marginVal    = document.getElementById('marginVal');
    const borderCheck    = document.getElementById('toggleBorder');
    const landscapeCheck = document.getElementById('toggleLandscape');
    const processBtn     = document.getElementById('processBtn');
    const statusDiv    = document.getElementById('status');
    const previewSection = document.getElementById('previewSection');
    const previewCanvas  = document.getElementById('previewCanvas');
    const previewCtx     = previewCanvas.getContext('2d');

    let currentFile  = null;
    let previewImage = null; // HTMLImageElement for the user's loaded image file
    let logoImage    = null; // default placeholder — shown before any file is loaded

    // Preload logo so the preview canvas has something to show immediately
    (function () {
        const img = new Image();
        img.onload = () => { logoImage = img; drawPreview(); };
        img.src = 'logo.svg';
    }());

    // ── Grid geometry helpers ──────────────────────────────────────────────────
    function getGrid() {
        const rows = Math.max(1, parseInt(rowsInput.value, 10) || 1);
        const cols = Math.max(1, parseInt(colsInput.value, 10) || 1);
        return { rows, cols };
    }

    function updateGridSummary() {
        const { rows, cols } = getGrid();
        rowsVal.textContent = rows;
        colsVal.textContent = cols;
        const n = rows * cols;
        gridSummary.textContent = `= ${n} cop${n === 1 ? 'y' : 'ies'}`;
    }

    // ── Page size helper ───────────────────────────────────────────────────────
    function getPageSize() {
        return landscapeCheck.checked
            ? { w: 792, h: 612 }
            : { w: 612, h: 792 };
    }

    // ── Live preview ───────────────────────────────────────────────────────────
    function drawPreview() {
        // Resize canvas to match output orientation (longest side = 233 px)
        const { w: pageW, h: pageH } = getPageSize();
        const LONG = 233;
        const cw = pageW >= pageH ? LONG : Math.round(LONG * pageW / pageH);
        const ch = pageH >= pageW ? LONG : Math.round(LONG * pageH / pageW);
        previewCanvas.width  = cw;
        previewCanvas.height = ch;

        previewCtx.clearRect(0, 0, cw, ch);
        previewCtx.fillStyle = '#fff';
        previewCtx.fillRect(0, 0, cw, ch);

        const { cols, rows } = getGrid();
        const margin = parseInt(marginInput.value, 10);
        const border = borderCheck.checked;
        const scale  = cw / pageW; // preview scale relative to PDF point space
        const scaledMargin = margin * scale;
        const cellW = cw / cols;
        const cellH = ch / rows;

        // Source to draw in each cell: user image > logo placeholder > PDF lines
        const sourceImage = previewImage ?? (currentFile === null ? logoImage : null);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cx = c * cellW;
                const cy = r * cellH;

                if (sourceImage) {
                    const usableW = Math.max(1, cellW - scaledMargin * 2);
                    const usableH = Math.max(1, cellH - scaledMargin * 2);
                    const imgScale = Math.min(usableW / sourceImage.naturalWidth, usableH / sourceImage.naturalHeight);
                    const imgW = sourceImage.naturalWidth  * imgScale;
                    const imgH = sourceImage.naturalHeight * imgScale;
                    previewCtx.drawImage(
                        sourceImage,
                        cx + (cellW - imgW) / 2,
                        cy + (cellH - imgH) / 2,
                        imgW, imgH
                    );
                } else {
                    // PDF placeholder — lines suggest document content
                    const usableW = Math.max(1, cellW - scaledMargin * 2);
                    const usableH = Math.max(1, cellH - scaledMargin * 2);
                    const px = cx + (cellW - usableW) / 2;
                    const py = cy + (cellH - usableH) / 2;

                    previewCtx.fillStyle = '#f4f4f4';
                    previewCtx.fillRect(px, py, usableW, usableH);

                    previewCtx.strokeStyle = '#d0d0d0';
                    previewCtx.lineWidth = 0.6;
                    const lines = 6;
                    for (let i = 1; i <= lines; i++) {
                        const ly = py + (usableH / (lines + 1)) * i;
                        const indent = usableW * 0.12;
                        const lineLen = i === 1 ? usableW * 0.55 : usableW * (0.7 + Math.random() * 0.15);
                        previewCtx.beginPath();
                        previewCtx.moveTo(px + indent, ly);
                        previewCtx.lineTo(px + Math.min(lineLen, usableW - indent), ly);
                        previewCtx.stroke();
                    }
                }

                if (border) {
                    previewCtx.strokeStyle = 'rgba(175,175,175,0.85)';
                    previewCtx.lineWidth = 0.75;
                    previewCtx.strokeRect(cx, cy, cellW, cellH);
                }
            }
        }
    }

    // ── Settings change listeners → redraw preview ─────────────────────────────
    rowsInput.addEventListener('input', () => { updateGridSummary(); drawPreview(); });
    colsInput.addEventListener('input', () => { updateGridSummary(); drawPreview(); });

    marginInput.addEventListener('input', () => {
        marginVal.textContent = `${marginInput.value} px`;
        drawPreview();
    });

    borderCheck.addEventListener('change', drawPreview);
    landscapeCheck.addEventListener('change', drawPreview);

    // ── File selection ─────────────────────────────────────────────────────────
    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0] || null;
        currentFile  = file;
        previewImage = null;

        if (!file) {
            processBtn.disabled = true;
            processBtn.textContent = 'Tile & Download';
            statusDiv.textContent  = '';
            drawPreview();
            return;
        }

        processBtn.disabled = false;
        processBtn.textContent = file.type === 'application/pdf' ? 'Tile PDF & Download' : 'Tile Image & Download';
        statusDiv.style.color  = 'black';
        statusDiv.textContent  = 'File loaded locally.';

        if (file.type.startsWith('image/')) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                previewImage = img;
                URL.revokeObjectURL(url);
                drawPreview();
            };
            img.onerror = () => URL.revokeObjectURL(url);
            img.src = url;
        } else {
            drawPreview();
        }
    });

    // ── Image → PNG ArrayBuffer converter (for non-JPEG images) ───────────────
    function convertToPng(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width  = img.naturalWidth;
                canvas.height = img.naturalHeight;
                canvas.getContext('2d').drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                canvas.toBlob(blob => {
                    if (!blob) { reject(new Error('toBlob failed')); return; }
                    blob.arrayBuffer().then(resolve).catch(reject);
                }, 'image/png');
            };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
            img.src = url;
        });
    }

    // ── Main tiling logic ──────────────────────────────────────────────────────
    processBtn.addEventListener('click', async () => {
        if (!currentFile) return;

        try {
            processBtn.disabled = true;
            const isPdf = currentFile.type === 'application/pdf';
            statusDiv.style.color = 'black';
            statusDiv.textContent = isPdf ? 'Processing PDF locally…' : 'Processing image locally…';

            const tilerPdf = await PDFLib.PDFDocument.create();

            const currentMargin = parseInt(marginInput.value, 10);
            const drawBorder    = borderCheck.checked;

            const { cols, rows } = getGrid();
            const n = rows * cols;

            const { w: targetWidth, h: targetHeight } = getPageSize();
            const cellWidth    = targetWidth  / cols;
            const cellHeight   = targetHeight / rows;

            let origWidth, origHeight, drawCell;

            if (isPdf) {
                const buf    = await currentFile.arrayBuffer();
                const srcPdf = await PDFLib.PDFDocument.load(buf);
                const [srcPage] = await tilerPdf.embedPdf(srcPdf);
                origWidth  = srcPage.width;
                origHeight = srcPage.height;
                drawCell = (page, x, y, w, h) => page.drawPage(srcPage, { x, y, width: w, height: h });
            } else {
                let embeddedImage;
                const isJpeg = currentFile.type === 'image/jpeg' || currentFile.type === 'image/jpg';
                if (isJpeg) {
                    embeddedImage = await tilerPdf.embedJpg(await currentFile.arrayBuffer());
                } else {
                    embeddedImage = await tilerPdf.embedPng(await convertToPng(currentFile));
                }
                origWidth  = embeddedImage.width;
                origHeight = embeddedImage.height;
                drawCell = (page, x, y, w, h) => page.drawImage(embeddedImage, { x, y, width: w, height: h });
            }

            const usableCellWidth  = cellWidth  - currentMargin * 2;
            const usableCellHeight = cellHeight - currentMargin * 2;
            const scale      = Math.min(usableCellWidth / origWidth, usableCellHeight / origHeight);
            const scaledWidth  = origWidth  * scale;
            const scaledHeight = origHeight * scale;

            const newPage  = tilerPdf.addPage([targetWidth, targetHeight]);
            const { rgb }  = PDFLib;
            let count = 0;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (count >= n) break;

                    const cellX = c * cellWidth;
                    const cellY = targetHeight - ((r + 1) * cellHeight);

                    if (drawBorder) {
                        newPage.drawRectangle({
                            x: cellX, y: cellY,
                            width: cellWidth, height: cellHeight,
                            borderColor: rgb(0.75, 0.75, 0.75),
                            borderWidth: 0.75,
                            opacity: 0.8
                        });
                    }

                    const x = cellX + currentMargin + (usableCellWidth  - scaledWidth)  / 2;
                    const y = cellY + currentMargin + (usableCellHeight - scaledHeight) / 2;
                    drawCell(newPage, x, y, scaledWidth, scaledHeight);
                    count++;
                }
            }

            const pdfBytes = await tilerPdf.save();
            const blob     = new Blob([pdfBytes], { type: 'application/pdf' });
            const link     = document.createElement('a');
            const blobUrl  = URL.createObjectURL(blob);
            const baseName = currentFile.name.replace(/\.[^.]+$/, '');

            link.href     = blobUrl;
            link.download = `tiled-${rows}x${cols}-${baseName}.pdf`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);

            statusDiv.style.color = 'green';
            statusDiv.textContent = 'Done! Saved to your downloads.';
        } catch (err) {
            console.error(err);
            statusDiv.style.color = 'red';
            statusDiv.textContent = 'Error processing file. Ensure it is a valid PDF or supported image.';
        } finally {
            processBtn.disabled = false;
        }
    });
</script>

</body>
</html>
